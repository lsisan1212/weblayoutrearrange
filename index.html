<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Mobile Web Wrapper with PreText</title>
    
    <script src="https://pretextjs.net/js/pretext.min.js" defer></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 置頂導覽列 */
        #control-bar {
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
            z-index: 99999;
            box-sizing: border-box;
        }

        #url-input {
            flex: 1;
            height: 34px;
            padding: 0 12px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        #go-btn {
            height: 34px;
            padding: 0 16px;
            background: #409eff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        /* 內容展示區 */
        #content-viewport {
            width: 100%;
            box-sizing: border-box;
            background: #ffffff;
            min-height: calc(100vh - 50px);
        }

        .status-msg {
            text-align: center;
            font-size: 16px;
            color: #606266;
            padding-top: 60px;
        }
    </style>
</head>
<body>

    <div id="control-bar">
        <input type="text" id="url-input" placeholder="輸入網址..." />
        <button id="go-btn">前往</button>
    </div>

    <div id="content-viewport">
        <div class="status-msg">正在為您下載並進行 PreText 排版優化...</div>
    </div>

    <script>
        const urlInput = document.getElementById('url-input');
        const goBtn = document.getElementById('go-btn');
        const viewport = document.getElementById('content-viewport');

        const urlParams = new URLSearchParams(window.location.search);
        const defaultUrl = 'https://news.mydrivers.com/blog/';
        const targetUrl = urlParams.get('url') || defaultUrl;

        urlInput.value = targetUrl;

        function navigateToUrl() {
            let inputUrl = urlInput.value.trim();
            if (!inputUrl) return;
            if (!/^https?:\/\//i.test(inputUrl)) inputUrl = 'https://' + inputUrl;
            window.location.href = window.location.origin + window.location.pathname + '?url=' + encodeURIComponent(inputUrl);
        }

        goBtn.addEventListener('click', navigateToUrl);
        urlInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') navigateToUrl(); });

        // 抓取目標網頁
        const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);

        fetch(proxyUrl)
            .then(response => {
                if (response.ok) return response.text();
                throw new Error('無法連線到該網頁');
            })
            .then(htmlContent => {
                const parser = new DOMParser();
                const remoteDoc = parser.parseFromString(htmlContent, 'text/html');

                // 修正圖片與相對路徑
                const baseTag = remoteDoc.createElement('base');
                baseTag.href = targetUrl;
                remoteDoc.head.appendChild(baseTag);

                // 暴力解除所有電腦版的寬度限制，讓排版完全自適應螢幕（不設固定寬度）
                const fluidStyle = remoteDoc.createElement('style');
                fluidStyle.innerHTML = `
                    html, body, div, p, table, tr, td, ul, li, section, article, header, footer {
                        max-width: 100% !important;
                        width: auto !important;
                        min-width: 0 !important;
                        float: none !important;
                        box-sizing: border-box !important;
                    }
                    img, video {
                        max-width: 100% !important;
                        height: auto !important;
                        display: block !important;
                        margin: 12px auto !important;
                    }
                    /* 設定基礎字體與舒適行高，留給 PreText 做後續微調 */
                    body, p, td, span, article {
                        font-size: 16px !important;
                        line-height: 1.8 !important;
                        color: #2c3e50 !important;
                    }
                `;
                remoteDoc.head.appendChild(fluidStyle);

                // 攔截點擊事件
                remoteDoc.addEventListener('click', function(e) {
                    const a = e.target.closest('a');
                    if (a && a.href && a.href.startsWith('http')) {
                        e.preventDefault();
                        window.location.href = window.location.origin + window.location.pathname + '?url=' + encodeURIComponent(a.href);
                    }
                });

                // 清空讀取訊息
                viewport.innerHTML = '';

                // 將原網頁的樣式移入主視窗
                const elementsToMove = remoteDoc.head.querySelectorAll('link, style, base');
                elementsToMove.forEach(el => document.head.appendChild(el));

                // 渲染網頁內容
                viewport.appendChild(remoteDoc.body);

                // --- 🛠️ 核心：呼跨網頁載入後，呼叫 PreText 進行文字重排優化 ---
                // 當內容塞進網頁後，立即讓 PreText 介入處理 viewport 內的所有中文文本
                if (typeof PreText !== 'undefined' && typeof PreText.process === 'function') {
                    PreText.process(viewport);
                } else if (typeof pretext === 'function') {
                    pretext(viewport);
                } else {
                    console.warn('PreText 腳本尚未載入完成，或 API 名稱有變。請檢查 script src 網址是否正確。');
                }
            })
            .catch(err => {
                viewport.innerHTML = `<div class="status-msg" style="color:#f56c6c;">優化失敗: ${err.message}</div>`;
            });
    </script>
</body>
</html>
