<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fluid Mobile Web Wrapper (Enterprise OOP)</title>
    
    <script src="https://pretextjs.net/js/pretext.min.js" defer></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #control-bar {
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
            z-index: 99999;
            box-sizing: border-box;
        }

        #url-input {
            flex: 1;
            height: 34px;
            padding: 0 12px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        #go-btn, #settings-btn {
            height: 34px;
            padding: 0 16px;
            background: #409eff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }

        #settings-btn {
            background: #909399;
        }

        #settings-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #ffffff;
            border-bottom: 1px solid #ebeef5;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            padding: 12px;
            box-sizing: border-box;
            z-index: 99998;
        }

        #settings-panel.collapsed {
            display: none;
        }

        .setting-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #303133;
        }

        .setting-row label {
            min-width: 64px;
        }

        .setting-row input[type="range"] {
            flex: 1;
        }

        .setting-row .val {
            min-width: 52px;
            text-align: right;
            color: #409eff;
            font-variant-numeric: tabular-nums;
        }

        #content-viewport {
            width: 100%;
            box-sizing: border-box;
            background: #ffffff;
            min-height: calc(100vh - 50px);
        }

        .status-msg {
            text-align: center;
            font-size: 16px;
            color: #606266;
            padding-top: 60px;
        }
    </style>
</head>
<body>

    <div id="control-bar">
        <input type="text" id="url-input" placeholder="輸入網址..." />
        <button id="go-btn">前往</button>
        <button id="settings-btn">設定</button>
    </div>

    <div id="settings-panel">
        <div class="setting-row">
            <label for="font-size">字體大小</label>
            <input type="range" id="font-size" min="12" max="32" step="1" value="16" />
            <span class="val" id="font-size-val">16px</span>
        </div>
    </div>

    <div id="content-viewport">
        <div class="status-msg">正在初始化系統並優化排版...</div>
    </div>

    <script>
        /**
         * 1. 負責封鎖與管控瀏覽器縮放行為的類別
         */
        class ZoomGuard {
            constructor() {
                this.bindPreventionEvents();
            }

            bindPreventionEvents() {
                document.addEventListener('touchstart', (e) => this.handleTouchStart(e), { passive: false });
                document.addEventListener('touchmove', (e) => this.handleTouchMove(e), { passive: false });
                
                let lastTouchEnd = 0;
                document.addEventListener('touchend', (e) => {
                    const now = (new Date()).getTime();
                    if (now - lastTouchEnd <= 300) {
                        e.preventDefault();
                    }
                    lastTouchEnd = now;
                }, { passive: false });
            }

            handleTouchStart(e) {
                if (e.touches.length > 1) {
                    e.preventDefault();
                }
            }

            handleTouchMove(e) {
                if (e.scale && e.scale !== 1) {
                    e.preventDefault();
                }
            }
        }

        /**
         * 2. 負責解析與管理網址參數的類別
         */
        class UrlManager {
            constructor(defaultUrl) {
                this.defaultUrl = defaultUrl;
                this.params = new URLSearchParams(window.location.search);
            }

            getTargetUrl() {
                return this.params.get('url') || this.defaultUrl;
            }

            normalizeUrl(url) {
                let trimmed = url.trim();
                if (!trimmed) return '';
                if (!/^https?:\/\//i.test(trimmed)) {
                    trimmed = 'https://' + trimmed;
                }
                return trimmed;
            }

            generateRedirectUrl(targetUrl) {
                return window.location.origin + window.location.pathname + '?url=' + encodeURIComponent(targetUrl);
            }
        }

        /**
         * 3. 負責置頂控制列 UI 互動的類別
         */
        class NavigationController {
            constructor(urlManager) {
                this.urlManager = urlManager;
                this.inputEl = document.getElementById('url-input');
                this.btnEl = document.getElementById('go-btn');
                this.initEvents();
            }

            setCurrentUrl(url) {
                this.inputEl.value = url;
            }

            initEvents() {
                this.btnEl.addEventListener('click', () => this.executeNavigation());
                this.inputEl.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.executeNavigation();
                });
            }

            executeNavigation() {
                const verifiedUrl = this.urlManager.normalizeUrl(this.inputEl.value);
                if (verifiedUrl) {
                    window.location.href = this.urlManager.generateRedirectUrl(verifiedUrl);
                }
            }
        }

        /**
         * 4. 負責使用者顯示設定（字體大小 / 寬度）的類別
         */
        class DisplaySettings {
            constructor(viewport) {
                this.viewport = viewport;
                this.fontSize = 16;
                this.userStyleId = 'user-display-style';
                this.cacheEls();
                this.bindEvents();
                this.apply();
            }

            cacheEls() {
                this.fontInput = document.getElementById('font-size');
                this.fontVal = document.getElementById('font-size-val');
            }

            bindEvents() {
                this.fontInput.addEventListener('input', () => {
                    this.fontSize = parseInt(this.fontInput.value, 10);
                    this.fontVal.textContent = this.fontSize + 'px';
                    this.applyFontSize();
                });
            }

            apply() {
                this.applyFontSize();
            }

            applyFontSize() {
                let styleTag = document.getElementById(this.userStyleId);
                if (!styleTag) {
                    styleTag = document.createElement('style');
                    styleTag.id = this.userStyleId;
                    document.head.appendChild(styleTag);
                }
                styleTag.textContent = `
                    #content-viewport, #content-viewport * {
                        font-size: ${this.fontSize}px !important;
                        line-height: 1.8 !important;
                    }
                `;
            }
        }

        /**
         * 5. 負責生成排版樣式（CSS）的類別
         */
        class StyleFactory {
            static createFluidStyleString() {
                return `
                    body {
                        padding-left: 1px !important;
                        padding-right: 2px !important;
                        box-sizing: border-box !important;
                        display: block !important;
                        width: 100% !important;
                        max-width: 100% !important;
                    }
                    html, div, p, table, tr, td, ul, li, section, article, header, footer {
                        max-width: 100% !important;
                        width: auto !important;
                        min-width: 0 !important;
                        float: none !important;
                        box-sizing: border-box !important;
                    }
                    img, video {
                        max-width: 100% !important;
                        height: auto !important;
                        display: block !important;
                        margin: 12px auto !important;
                    }
                    p, td, span, article {
                        line-height: 1.8 !important;
                    }
                `;
            }
        }

        /**
         * 6. 負責清洗 DOM、防禦超連結脫離框架的類別
         */
        class DomSanitizer {
            constructor(urlManager) {
                this.urlManager = urlManager;
            }

            purifyLinks(remoteDocument) {
                remoteDocument.body.querySelectorAll('a').forEach(link => {
                    link.removeAttribute('target');
                    link.removeAttribute('onclick');
                });
            }

            injectMetadata(remoteDocument, targetUrl) {
                const baseTag = remoteDocument.createElement('base');
                baseTag.href = targetUrl;
                remoteDocument.head.appendChild(baseTag);

                const styleTag = remoteDocument.createElement('style');
                styleTag.innerHTML = StyleFactory.createFluidStyleString();
                remoteDocument.head.appendChild(styleTag);
            }

            registerGlobalClickInterceptor() {
                document.addEventListener('click', (e) => {
                    const a = e.target.closest('a');
                    if (a && a.href && a.href.startsWith('http')) {
                        if (a.closest('#control-bar') || a.closest('#settings-panel')) return;

                        e.preventDefault();
                        e.stopImmediatePropagation();
                        
                        window.location.href = this.urlManager.generateRedirectUrl(a.href);
                    }
                }, true);
            }
        }

        /**
         * 7. 負責與 PreText 排版引擎對接的類別
         */
        class TypographyEngine {
            static runOptimization(targetContainer) {
                if (typeof PreText !== 'undefined' && typeof PreText.process === 'function') {
                    PreText.process(targetContainer);
                } else if (typeof pretext === 'function') {
                    pretext(targetContainer);
                }
            }
        }

        /**
         * 8. 核心應用程式調度中心（Orchestrator）
         */
        class App {
            constructor() {
                this.viewport = document.getElementById('content-viewport');
                
                this.zoomGuard = new ZoomGuard();
                this.urlManager = new UrlManager('https://news.mydrivers.com/blog/');
                this.navController = new NavigationController(this.urlManager);
                this.sanitizer = new DomSanitizer(this.urlManager);
                this.displaySettings = new DisplaySettings(this.viewport);
            }

            async launch() {
                const targetUrl = this.urlManager.getTargetUrl();
                this.navController.setCurrentUrl(targetUrl);
                this.sanitizer.registerGlobalClickInterceptor();

                try {
                    const htmlContent = await this.fetchRemoteContent(targetUrl);
                    this.render(htmlContent, targetUrl);
                } catch (err) {
                    this.renderError(err.message);
                }
            }

            async fetchRemoteContent(url) {
                const proxies = [
                    u => 'https://corsproxy.io/?' + encodeURIComponent(u),
                    u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
                    u => 'https://thingproxy.freeboard.io/fetch/' + u
                ];
                let lastErr;
                for (const makeUrl of proxies) {
                    try {
                        const response = await fetch(makeUrl(url));
                        if (response.ok) return await response.text();
                        lastErr = new Error('代理回應 ' + response.status);
                    } catch (e) {
                        lastErr = e;
                    }
                }
                throw new Error('所有代理連線失敗: ' + (lastErr && lastErr.message));
            }

            render(htmlContent, targetUrl) {
                const parser = new DOMParser();
                const remoteDoc = parser.parseFromString(htmlContent, 'text/html');

                this.sanitizer.purifyLinks(remoteDoc);
                this.sanitizer.injectMetadata(remoteDoc, targetUrl);

                this.viewport.innerHTML = '';
                
                const assets = remoteDoc.head.querySelectorAll('link, style, base');
                assets.forEach(asset => document.head.appendChild(asset));

                this.viewport.appendChild(remoteDoc.body);

                TypographyEngine.runOptimization(this.viewport);
                // 重新套用使用者設定，確保每次換頁後仍生效
                this.displaySettings.apply();
            }

            renderError(message) {
                this.viewport.innerHTML = `<div class="status-msg" style="color:#f56c6c;">優化失敗: ${message}</div>`;
            }
        }

        // --- 🚀 系統啟動點 ---
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('settings-btn').addEventListener('click', () => {
                document.getElementById('settings-panel').classList.toggle('collapsed');
            });

            const application = new App();
            application.launch();
        });
    </script>
</body>
</html>
