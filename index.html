<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fluid Mobile Web Wrapper (Unbreakable)</title>
    
    <script src="https://pretextjs.net/js/pretext.min.js" defer></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #control-bar {
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
            z-index: 99999;
            box-sizing: border-box;
        }

        #url-input {
            flex: 1;
            height: 34px;
            padding: 0 12px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        #go-btn {
            height: 34px;
            padding: 0 16px;
            background: #409eff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        #content-viewport {
            width: 100%;
            box-sizing: border-box;
            background: #ffffff;
            min-height: calc(100vh - 50px);
        }

        .status-msg {
            text-align: center;
            font-size: 16px;
            color: #606266;
            padding-top: 60px;
        }
    </style>
</head>
<body>

    <div id="control-bar">
        <input type="text" id="url-input" placeholder="輸入網址..." />
        <button id="go-btn">前往</button>
    </div>

    <div id="content-viewport">
        <div class="status-msg">正在啟動高安全防禦系統...</div>
    </div>

    <script>
        /**
         * 1. 負責封鎖與管控瀏覽器縮放行為的類別 (禁止縮放)
         */
        class ZoomGuard {
            constructor() {
                this.bindPreventionEvents();
            }

            bindPreventionEvents() {
                document.addEventListener('touchstart', (e) => this.handleTouchStart(e), { passive: false });
                document.addEventListener('touchmove', (e) => this.handleTouchMove(e), { passive: false });
                
                let lastTouchEnd = 0;
                document.addEventListener('touchend', (e) => {
                    const now = (new Date()).getTime();
                    if (now - lastTouchEnd <= 300) e.preventDefault();
                    lastTouchEnd = now;
                }, { passive: false });
            }

            handleTouchStart(e) {
                if (e.touches.length > 1) e.preventDefault();
            }

            handleTouchMove(e) {
                if (e.scale && e.scale !== 1) e.preventDefault();
            }
        }

        /**
         * 2. 負責解析與管理網址參數的類別
         */
        class UrlManager {
            constructor(defaultUrl) {
                this.defaultUrl = defaultUrl;
                this.params = new URLSearchParams(window.location.search);
            }

            getTargetUrl() {
                return this.params.get('url') || this.defaultUrl;
            }

            normalizeUrl(url) {
                let trimmed = url.trim();
                if (!trimmed) return '';
                if (!/^https?:\/\//i.test(trimmed)) trimmed = 'https://' + trimmed;
                return trimmed;
            }

            generateRedirectUrl(targetUrl) {
                return window.location.origin + window.location.pathname + '?url=' + encodeURIComponent(targetUrl);
            }
        }

        /**
         * 3. 負責置頂控制列 UI 互動的類別
         */
        class NavigationController {
            constructor(urlManager) {
                this.urlManager = urlManager;
                this.inputEl = document.getElementById('url-input');
                this.btnEl = document.getElementById('go-btn');
                this.initEvents();
            }

            setCurrentUrl(url) {
                this.inputEl.value = url;
            }

            initEvents() {
                this.btnEl.addEventListener('click', () => this.executeNavigation());
                this.inputEl.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.executeNavigation();
                });
            }

            executeNavigation() {
                const verifiedUrl = this.urlManager.normalizeUrl(this.inputEl.value);
                if (verifiedUrl) {
                    window.location.href = this.urlManager.generateRedirectUrl(verifiedUrl);
                }
            }
        }

        /**
         * 4. 負責生成排版樣式的工廠類別（精確控制 1px / 2px 留白）
         */
        class StyleFactory {
            static createFluidStyleString() {
                return `
                    body {
                        padding-left: 1px !important;
                        padding-right: 2px !important;
                        box-sizing: border-box !important;
                        display: block !important;
                        width: 100% !important;
                        max-width: 100% !important;
                    }
                    html, div, p, table, tr, td, ul, li, section, article, header, footer {
                        max-width: 100% !important;
                        width: auto !important;
                        min-width: 0 !important;
                        float: none !important;
                        box-sizing: border-box !important;
                    }
                    img, video {
                        max-width: 100% !important;
                        height: auto !important;
                        display: block !important;
                        margin: 12px auto !important;
                    }
                    p, td, span, article {
                        font-size: 16px !important;
                        line-height: 1.8 !important;
                        color: #2c3e50 !important;
                    }
                `;
            }
        }

        /**
         * 5. 【終極防線】負責清洗 DOM、摧毀惡意腳本、全事件攔截的類別
         */
        class DomSanitizer {
            constructor(urlManager) {
                this.urlManager = urlManager;
            }

            // 核心淨化：直接拔除所有可能執行跳轉代碼的 HTML 元素
            purifyRemoteDocument(remoteDocument) {
                // 1. 拔除所有遠端網頁自帶的 script 腳本，讓網頁失去任何主動跳轉的主權
                remoteDocument.querySelectorAll('script').forEach(script => script.remove());

                // 2. 徹底清洗所有超連結的潛在跳出屬性
                remoteDocument.body.querySelectorAll('a').forEach(link => {
                    link.removeAttribute('target');
                    link.removeAttribute('onclick');
                });

                // 3. 清洗所有表單，防止表單提交導致脫離框架
                remoteDocument.body.querySelectorAll('form').forEach(form => {
                    form.removeAttribute('target');
                    form.removeAttribute('onsubmit');
                });
            }

            injectMetadata(remoteDocument, targetUrl) {
                const baseTag = remoteDocument.createElement('base');
                baseTag.href = targetUrl;
                remoteDocument.head.appendChild(baseTag);

                const styleTag = remoteDocument.createElement('style');
                styleTag.innerHTML = StyleFactory.createFluidStyleString();
                remoteDocument.head.appendChild(styleTag);
            }

            // 核心防禦：全方位監聽所有可能導致導航的手勢事件
            registerGlobalInterceptors() {
                // 封鎖所有可能被老舊網頁用來做非同步跳轉的手勢事件
                const hijackEvents = ['click', 'touchend', 'mousedown', 'pointerup'];
                
                hijackEvents.forEach(eventType => {
                    document.addEventListener(eventType, (e) => {
                        const a = e.target.closest('a');
                        if (a && a.href && a.href.startsWith('http')) {
                            if (a.closest('#control-bar')) return;

                            // 立即切斷事件，防止任何行內或後續代碼執行
                            e.preventDefault();
                            e.stopImmediatePropagation();
                            
                            // 為了避免多個事件重複觸發跳轉，我們只在 click 和 touchend 階段執行安全重新導向
                            if (eventType === 'click' || eventType === 'touchend') {
                                const nextUrl = this.urlManager.generateRedirectUrl(a.href);
                                if (window.location.href !== nextUrl) {
                                    window.location.href = nextUrl;
                                }
                            }
                        }
                    }, true); // 採用最強力的 Capture 捕獲模式
                });
            }
        }

        /**
         * 6. 負責與 PreText 排版引擎對接的類別
         */
        class TypographyEngine {
            static runOptimization(targetContainer) {
                if (typeof PreText !== 'undefined' && typeof PreText.process === 'function') {
                    PreText.process(targetContainer);
                } else if (typeof pretext === 'function') {
                    pretext(targetContainer);
                }
            }
        }

        /**
         * 7. 核心應用程式調度中心（Orchestrator）
         */
        class App {
            constructor() {
                this.viewport = document.getElementById('content-viewport');
                this.proxyBase = 'https://corsproxy.io/?';
                
                this.zoomGuard = new ZoomGuard();
                this.urlManager = new UrlManager('https://news.mydrivers.com/blog/');
                this.navController = new NavigationController(this.urlManager);
                this.sanitizer = new DomSanitizer(this.urlManager);
            }

            async launch() {
                const targetUrl = this.urlManager.getTargetUrl();
                this.navController.setCurrentUrl(targetUrl);
                
                // 啟動全手勢事件監聽攔截
                this.sanitizer.registerGlobalInterceptors();

                try {
                    const htmlContent = await this.fetchRemoteContent(targetUrl);
                    this.render(htmlContent, targetUrl);
                } catch (err) {
                    this.renderError(err.message);
                }
            }

            async fetchRemoteContent(url) {
                const requestUrl = this.proxyBase + encodeURIComponent(url);
                const response = await fetch(requestUrl);
                if (!response.ok) throw new Error('網絡代理連線異常');
                return await response.text();
            }

            render(htmlContent, targetUrl) {
                const parser = new DOMParser();
                const remoteDoc = parser.parseFromString(htmlContent, 'text/html');

                // 進行極致 DOM 淨化（包含刪除所有遠端腳本）與樣式注入
                this.sanitizer.purifyRemoteDocument(remoteDoc);
                this.sanitizer.injectMetadata(remoteDoc, targetUrl);

                this.viewport.innerHTML = '';
                
                // 遷移必要的 CSS 資源到主網頁的 Head 
                const assets = remoteDoc.head.querySelectorAll('link, style, base');
                assets.forEach(asset => document.head.appendChild(asset));

                // 將安全的網頁主體塞入框架
                this.viewport.appendChild(remoteDoc.body);

                // 呼叫 PreText 執行精美排版
                TypographyEngine.runOptimization(this.viewport);
            }

            renderError(message) {
                this.viewport.innerHTML = `<div class="status-msg" style="color:#f56c6c;">優化失敗: ${message}</div>`;
            }
        }

        // --- 🚀 系統啟動 ---
        document.addEventListener('DOMContentLoaded', () => {
            const application = new App();
            application.launch();
        });
    </script>
</body>
</html>
