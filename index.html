<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fluid Mobile Web Wrapper (iframe srcdoc)</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            background-color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        #control-bar {
            flex: 0 0 50px;
            height: 50px;
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
            z-index: 99999;
            box-sizing: border-box;
        }

        #url-input {
            flex: 1;
            height: 34px;
            padding: 0 12px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        #go-btn, #settings-btn {
            height: 34px;
            padding: 0 16px;
            background: #409eff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }

        #settings-btn {
            background: #909399;
        }

        #settings-panel {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #ffffff;
            border-bottom: 1px solid #ebeef5;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            padding: 12px;
            box-sizing: border-box;
            z-index: 99998;
        }

        #settings-panel.collapsed {
            display: none;
        }

        .setting-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #303133;
        }

        .setting-row label {
            min-width: 64px;
        }

        .setting-row input[type="range"] {
            flex: 1;
        }

        .setting-row .val {
            min-width: 52px;
            text-align: right;
            color: #409eff;
            font-variant-numeric: tabular-nums;
        }

        #frame-wrap {
            flex: 1 1 auto;
            min-height: 0;
            position: relative;
            background: #ffffff;
        }

        #content-viewport {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            background: #ffffff;
        }

        #overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 16px;
            color: #606266;
            background: #ffffff;
        }
    </style>
</head>
<body>

    <div id="control-bar">
        <input type="text" id="url-input" placeholder="輸入網址..." />
        <button id="go-btn">前往</button>
        <button id="settings-btn">設定</button>
    </div>

    <div id="settings-panel">
        <div class="setting-row">
            <label for="font-size">字體大小</label>
            <input type="range" id="font-size" min="12" max="32" step="1" value="16" />
            <span class="val" id="font-size-val">16px</span>
        </div>
    </div>

    <div id="frame-wrap">
        <iframe id="content-viewport" sandbox="allow-scripts allow-same-origin allow-popups allow-modals"></iframe>
        <div id="overlay">正在初始化系統並優化排版...</div>
    </div>

    <script>
        /**
         * 1. 封鎖瀏覽器縮放行為
         */
        class ZoomGuard {
            constructor() {
                this.bindPreventionEvents();
            }
            bindPreventionEvents() {
                document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
                document.addEventListener('touchmove', (e) => { if (e.scale && e.scale !== 1) e.preventDefault(); }, { passive: false });
            }
        }

        /**
         * 2. 網址參數管理
         */
        class UrlManager {
            constructor(defaultUrl) {
                this.defaultUrl = defaultUrl;
                this.params = new URLSearchParams(window.location.search);
            }
            getTargetUrl() {
                return this.params.get('url') || this.defaultUrl;
            }
            normalizeUrl(url) {
                let t = (url || '').trim();
                if (!t) return '';
                if (!/^https?:\/\//i.test(t)) t = 'https://' + t;
                return t;
            }
            generateRedirectUrl(targetUrl) {
                return window.location.origin + window.location.pathname + '?url=' + encodeURIComponent(targetUrl);
            }
        }

        /**
         * 3. 控制列互動
         */
        class NavigationController {
            constructor(urlManager) {
                this.urlManager = urlManager;
                this.inputEl = document.getElementById('url-input');
                this.btnEl = document.getElementById('go-btn');
                this.btnEl.addEventListener('click', () => this.executeNavigation());
                this.inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') this.executeNavigation(); });
            }
            setCurrentUrl(url) { this.inputEl.value = url; }
            executeNavigation() {
                const v = this.urlManager.normalizeUrl(this.inputEl.value);
                if (v) window.location.href = this.urlManager.generateRedirectUrl(v);
            }
        }

        /**
         * 4. 使用者顯示設定（字體大小）— 套用至 iframe 內部文件
         */
        class DisplaySettings {
            constructor(iframe) {
                this.iframe = iframe;
                this.fontSize = 16;
                this.userStyleId = 'wb-user-font';
                this.input = document.getElementById('font-size');
                this.val = document.getElementById('font-size-val');
                this.input.addEventListener('input', () => {
                    this.fontSize = parseInt(this.input.value, 10);
                    this.val.textContent = this.fontSize + 'px';
                    this.applyFontSize();
                });
            }
            applyFontSize() {
                const doc = this.iframe.contentDocument;
                if (!doc || !doc.documentElement) return;
                doc.documentElement.setAttribute('id', 'wbroot');
                let s = doc.getElementById(this.userStyleId);
                if (!s) {
                    s = doc.createElement('style');
                    s.id = this.userStyleId;
                    (doc.head || doc.documentElement).appendChild(s);
                }
                // 強制每個元素字體大小（不動顏色），等同舊版行為
                s.textContent = `#wbroot, #wbroot * { font-size: ${this.fontSize}px !important; line-height: 1.8 !important; }`;
            }
        }

        /**
         * 5. 注入 <base> + 流動排版 + 點擊攔截腳本到遠端 HTML
         */
        function injectIntoHtml(html, baseUrl) {
            const viewport = `<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">`;
            const fluid = `<style id="wb-fluid">` +
                `body{padding:0 2px;box-sizing:border-box;}` +
                `img,video{max-width:100%;height:auto;display:block;margin:12px auto;}` +
                `a{color:inherit;}` +
                `</style>`;
            const base = `<base href="${baseUrl}">`;
            // 注入 iframe 內部：鎖定縮放 + 攔截站內連結（保持在 wrapper 內）
            const navScript = `<script>(function(){` +
                `function block(e){if(e.touches&&e.touches.length>1)e.preventDefault();if(e.scale&&e.scale!==1)e.preventDefault();}` +
                `document.addEventListener('touchstart',block,{passive:false});` +
                `document.addEventListener('touchmove',block,{passive:false});` +
                `document.addEventListener('click',function(e){` +
                `var a=e.target.closest?e.target.closest('a'):null;` +
                `if(a&&a.href&&/^https?:\\/\\//i.test(a.href)){e.preventDefault();` +
                `parent.postMessage({__wbNav:a.href},'*');}});})();<\/script>`;
            if (/<head[^>]*>/i.test(html)) {
                return html.replace(/<head[^>]*>/i, (m) => m + viewport + base + fluid + navScript);
            }
            return viewport + base + fluid + navScript + html;
        }

        /**
         * 6. 核心調度
         */
        class App {
            constructor() {
                this.iframe = document.getElementById('content-viewport');
                this.overlay = document.getElementById('overlay');
                this.urlManager = new UrlManager('https://news.mydrivers.com/blog/');
                this.navController = new NavigationController(this.urlManager);
                this.displaySettings = new DisplaySettings(this.iframe);
                new ZoomGuard();

                this.iframe.addEventListener('load', () => {
                    this.overlay.style.display = 'none';
                    this.displaySettings.applyFontSize();
                });

                window.addEventListener('message', (e) => {
                    if (e.data && e.data.__wbNav) {
                        window.location.href = this.urlManager.generateRedirectUrl(e.data.__wbNav);
                    }
                });
            }

            async launch() {
                const targetUrl = this.urlManager.getTargetUrl();
                this.navController.setCurrentUrl(targetUrl);
                this.overlay.style.display = 'flex';
                this.overlay.textContent = '正在初始化系統並優化排版...';
                try {
                    const html = await this.fetchRemoteContent(targetUrl);
                    this.iframe.srcdoc = injectIntoHtml(html, targetUrl);
                } catch (err) {
                    this.overlay.style.display = 'flex';
                    this.overlay.style.color = '#f56c6c';
                    this.overlay.textContent = '優化失敗: ' + err.message;
                }
            }

            async fetchRemoteContent(url) {
                // 本機同源代理優先（不受瀏覽器 CORS 限制），外部代理降為備用
                const proxies = [
                    u => '/proxy?url=' + encodeURIComponent(u),
                    u => 'https://corsproxy.io/?' + encodeURIComponent(u),
                    u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u)
                ];
                let lastErr;
                for (const makeUrl of proxies) {
                    try {
                        const response = await fetch(makeUrl(url));
                        if (response.ok) return await response.text();
                        lastErr = new Error('代理回應 ' + response.status);
                    } catch (e) {
                        lastErr = e;
                    }
                }
                throw new Error('所有代理連線失敗: ' + (lastErr && lastErr.message));
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('settings-btn').addEventListener('click', () => {
                document.getElementById('settings-panel').classList.toggle('collapsed');
            });
            const app = new App();
            app.launch();
        });
    </script>
</body>
</html>
